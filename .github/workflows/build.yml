name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: nyasniproxy
            artifact: nyasniproxy-linux-x64
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: nyasniproxy.exe
            artifact: nyasniproxy-windows-x64
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bin: nyasniproxy
            artifact: nyasniproxy-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.artifact }}/"
          cp README.md "dist/${{ matrix.artifact }}/"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "${{ matrix.artifact }}.zip" "./dist/${{ matrix.artifact }}/*"
          else
            tar -czf "${{ matrix.artifact }}.tar.gz" -C dist "${{ matrix.artifact }}"
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error
